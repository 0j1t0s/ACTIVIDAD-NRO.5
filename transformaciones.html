<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Transformaciones 3D</title>
  <style>body { margin: 0; }</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Cubo
const geometry = new THREE.BoxGeometry();
const material = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true });
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

camera.position.z = 5;

// Controles
document.addEventListener("keydown", (e) => {
  switch(e.key) {
    case "ArrowRight": cube.position.x += 0.2; break;
    case "ArrowLeft": cube.position.x -= 0.2; break;
    case "ArrowUp": cube.position.y += 0.2; break;
    case "ArrowDown": cube.position.y -= 0.2; break;

    case "r": cube.rotation.x += 0.2; break;
    case "t": cube.rotation.y += 0.2; break;

    case "+": 
    case "=": cube.scale.set(
      cube.scale.x + 0.1,
      cube.scale.y + 0.1,
      cube.scale.z + 0.1
    ); break;

    case "-": cube.scale.set(
      cube.scale.x - 0.1,
      cube.scale.y - 0.1,
      cube.scale.z - 0.1
    ); break;
  }
});

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
